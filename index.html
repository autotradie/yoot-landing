<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOT First - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1E3A8A;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 24px;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .philosophy {
            font-size: 32px;
            font-weight: 600;
            margin: 40px 0;
            color: #FFD700;
        }
        .social {
            margin-top: 50px;
        }
        .social a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .social a:hover {
            opacity: 1;
        }
        @media (max-width: 600px) {
            h1 { font-size: 48px; }
            .tagline { font-size: 18px; }
            .philosophy { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YOOT</h1>
        <p class="tagline">Software for tradies who work out of their ute</p>
        <p class="philosophy">Before not after.</p>
        <p class="tagline">Coming Soon</p>
        <div class="social">
            <a href="https://instagram.com/yootfirst">Instagram</a>
            <a href="https://facebook.com/yootfirst">Facebook</a>
            <a href="https://linkedin.com/company/yoot">LinkedIn</a>
        </div>
    </div>
</body>
</html>
